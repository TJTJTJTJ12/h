name: Build ClawEasy APK

on:
  push:
    branches: [main, claweasy-build, claweasy-verify]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout ClawEasy patch kit
        uses: actions/checkout@v4

      - name: Checkout OpenClaw Android base
        uses: actions/checkout@v4
        with:
          repository: mithun50/openclaw-termux
          ref: v1.8.7
          path: upstream

      - name: Apply ClawEasy overlays and runtime fixes
        run: |
          python3 -m py_compile patch.py patch_runtime.py patch_runtime_fix.py patch_node.py patch_resolv.py
          cp overlay/flutter_app/lib/screens/free_model_setup_screen.dart \
             upstream/flutter_app/lib/screens/free_model_setup_screen.dart
          python3 patch.py
          python3 patch_runtime.py
          python3 patch_runtime_fix.py
          python3 patch_node.py
          python3 patch_resolv.py

      - name: Verify reliability patches
        run: |
          grep -F 'openclaw@2026.6.9' upstream/flutter_app/lib/services/bootstrap_service.dart
          grep -F "nodeVersion = '22.22.1'" upstream/flutter_app/lib/constants.dart
          grep -F 'NODE_REQUIRED=22.22.1' upstream/flutter_app/lib/screens/free_model_setup_screen.dart
          grep -F '_ensureRuntimeFiles' upstream/flutter_app/lib/screens/free_model_setup_screen.dart
          grep -F "File('$filesDir/config/resolv.conf')" upstream/flutter_app/lib/screens/free_model_setup_screen.dart
          grep -F 'writeResolvConf()' upstream/flutter_app/android/app/src/main/kotlin/com/nxg/openclawproot/BootstrapManager.kt
          grep -F 'claweasy-gateway-smoke-v1' upstream/flutter_app/lib/screens/free_model_setup_screen.dart
          grep -F '/healthz' upstream/flutter_app/lib/services/gateway_service.dart
          grep -F "join('\\n')" upstream/flutter_app/lib/services/gateway_service.dart
          grep -F -- '--allow-unconfigured --bind loopback --port 18789' \
            upstream/flutter_app/android/app/src/main/kotlin/com/nxg/openclawproot/GatewayService.kt
          grep -F 'version: 0.1.4+5' upstream/flutter_app/pubspec.yaml

      - name: Verify Node.js download exists
        run: curl -fsI --retry 3 https://nodejs.org/dist/v22.22.1/node-v22.22.1-linux-arm64.tar.xz

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Fetch PRoot binaries
        working-directory: upstream
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify PRoot native dependencies
        run: |
          test -f upstream/flutter_app/android/app/src/main/jniLibs/arm64-v8a/libandroid-shmem.so
          readelf -d upstream/flutter_app/android/app/src/main/jniLibs/arm64-v8a/libproot.so | grep 'libandroid-shmem.so'

      - name: Install Flutter dependencies
        working-directory: upstream/flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: upstream/flutter_app
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee ../../analyze.log
          echo ${PIPESTATUS[0]} > ../../analyze-exit-code.txt
          exit 0

      - name: Build ARM64 APK
        working-directory: upstream/flutter_app
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi --target-platform android-arm64 2>&1 | tee ../../build.log

      - name: Verify packaged native dependency
        run: unzip -l upstream/flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk | grep 'lib/arm64-v8a/libandroid-shmem.so'

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp upstream/flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             artifacts/ClawEasy-0.1.4-arm64.apk
          sha256sum artifacts/ClawEasy-0.1.4-arm64.apk > artifacts/SHA256SUMS.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClawEasy-Android-APK
          path: artifacts/*
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClawEasy-Build-Diagnostics
          path: |
            analyze.log
            analyze-exit-code.txt
            build.log
          if-no-files-found: ignore
          retention-days: 7
